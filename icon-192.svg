<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="42" fill="#080808"/>
  <rect width="192" height="192" rx="42" fill="url(#g1)"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- camera body -->
  <rect x="36" y="68" width="120" height="82" rx="14" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- lens outer -->
  <circle cx="96" cy="109" r="30" fill="#141414" stroke="#2a2a2a" stroke-width="2"/>
  <!-- lens inner -->
  <circle cx="96" cy="109" r="22" fill="#0a0a0a" stroke="#333" stroke-width="1.5"/>
  <!-- lens shine -->
  <circle cx="96" cy="109" r="14" fill="url(#lensG)"/>
  <defs>
    <radialGradient id="lensG" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#a8ff78" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#78ffd6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#004420" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <!-- viewfinder bump -->
  <rect x="72" y="56" width="48" height="18" rx="8" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- shutter btn -->
  <circle cx="148" cy="84" r="9" fill="#a8ff78" opacity="0.85"/>
  <!-- ai spark -->
  <text x="82" y="115" font-size="18" fill="#a8ff78" opacity="0.95" font-family="sans-serif">✦</text>
</svg>
